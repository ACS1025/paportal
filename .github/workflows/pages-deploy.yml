name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site
        run: |
          # Adicione aqui o comando para buildar seu site
          # Exemplos:
          # npm install && npm run build
          # jekyll build
          # python build.py
          echo "Building..."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: .  # Mude para o diretório de saída do seu build

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
